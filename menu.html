<!DOCTYPE html>
<html>
    <head>
        <style>
            html,
            head,
            body {
                margin:0;
                padding:0;
                width: 100%;
                height: 100%;

                overflow: hidden;

                font-family: Arial, Helvetica, sans-serif;
            }

            .menu {
                background: rgba(50, 50, 50, 0.5);
                color: orange;

                display: flex;

                flex-direction: column;

                width: 100%;

                box-sizing: border-box;

                padding: 10px;
                gap: 10px;
            }

            .row {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 10px;
            }

            .row * {
                flex: 1;
            }

            input[type="range"] {
                width: 100%;
                height: 4px;
                appearance: none;
                background: orange;
                border-radius: 0;
                outline: none;
                border: none;
            }

            input[type="range"]::-webkit-slider-thumb {
                appearance: none;
                width: 10px;
                height: 10px;
                background: grey;
                border: 1px black solid;
                border-radius: 0;
                cursor: pointer;
            }

            input[type="range"]::-webkit-slider-thumb:hover {
                background: rgb(102, 102, 102);
            }

            button {
                appearance: none;
                background: transparent;
                border: orange 1px solid;
                color: orange;
                cursor: pointer;
            }

            button:hover {
                background: orange;
                color: black;
                text-shadow: 0 0 1px black;
            }

            hr {
                appearance: none;
                margin: 0;
                padding: 0;
                border: none;
                background: rgba(255, 166, 0, 0.5);
                height: 1px;
            }
        </style>
    </head>
    <body>
        <div class="menu">

        </div>

        <script>
            const { ipcRenderer } = require("electron");

            ipcRenderer.on("menu-content", (e, html) => {
                const menu = document.querySelector(".menu");

                menu.innerHTML = html;

                ipcRenderer.send("menu-height", menu.scrollHeight);
            });

            window.addEventListener("click", (e) => {
                ipcRenderer.send("click", {
                    x: e.clientX,
                    y: e.clientY,
                    elem: e.target.className
                });
            });

            function setAnimation(animation, width) {
                ipcRenderer.send("set-animation", animation, width);
            }

            function setAnimationSpeed(speed) {
                const animationSpeedLabel = document.querySelector(".animation-speed-label")

                animationSpeedLabel.innerHTML = speed+"BPM"

                ipcRenderer.send("set-animation-speed", speed);
            }

            function setReflect(reflect) {
                const reflectLabel = document.querySelector(".reflect-label")

                reflectLabel.innerHTML = reflect

                ipcRenderer.send("set-animation-reflection", reflect);
            }
        </script>
    </body>
</html>
