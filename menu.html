<!DOCTYPE html>
<html>
<head>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;

            overflow: hidden;

            font-family: Arial, Helvetica, sans-serif;
        }

        .menu {
            width: 100%;
            box-sizing: border-box;

            display: flex;
            flex-direction: column;
            gap: 10px;

            padding: 10px;

            background: rgba(50, 50, 50, 0.5);
            color: orange;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .row > * {
            flex: 1;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;

            appearance: none;
            outline: none;
            border: none;
            border-radius: 0;

            background: orange;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;

            width: 10px;
            height: 10px;

            border: 1px solid black;
            border-radius: 0;

            background: grey;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: rgb(102, 102, 102);
        }

        button {
            appearance: none;

            padding: 2px;

            border: 1px solid orange;

            background: transparent;
            color: orange;

            cursor: pointer;
        }

        button:hover {
            background: orange;
            color: black;

            text-shadow: 0 0 1px black;
        }

        hr {
            margin: 0;
            border: none;

            height: 1px;

            background: rgba(255, 166, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="menu"></div>

    <script>
        const { ipcRenderer } = require("electron");

        const menu = document.querySelector(".menu");

        ipcRenderer.on("menu-content", (e, html) => {
            menu.innerHTML = html;

            ipcRenderer.send("menu-height", menu.scrollHeight);
        });

        window.addEventListener("click", (e) => {
            ipcRenderer.send("click", {
                x: e.clientX,
                y: e.clientY,
                elem: e.target.className || ""
            });
        });

        function setAnimation(animation, width) {
            ipcRenderer.send("set-animation", animation, width);
        }

        function setAnimationSpeed(speed) {
            const label = document.querySelector(".animation-speed-label");

            if (label) {
                label.textContent = `${speed} BPM`;
            }

            ipcRenderer.send("set-animation-speed", Number(speed));
        }

        function setReflect(reflect) {
            const label = document.querySelector(".reflect-label");

            if (label) {
                label.textContent = reflect;
            }

            ipcRenderer.send(
                "set-animation-reflection",
                Number(reflect)
            );
        }
    </script>
</body>
</html>
