<!DOCTYPE html>
<html>
<head>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
}

#container {
  width: 220px;
  height: 220px;

  display: flex;
  justify-content: center;
  align-items: center;
  cursor: grab;
}

#container:active {
  cursor: grabbing;
}

img {
  width: 200px;
  height: 200px;
  pointer-events: none;
  user-select: none;
}
</style>
</head>

<body>

<div id="container">
  <img id="anim" src="animations/Waiting.gif" />
</div>

<script>
const container = document.querySelector("#container")
const anim = document.getElementById('anim');

let animation = 0;

const animations = [
    "Waiting",
    "Stepping",
    "Jumping",
    "Zombie",
    "Waving",
    "Hula",
    "Windmill",
    "Zitabata",
    "Dervish"
]

let held = false;

container.addEventListener('mousedown', () => {
    held = true;
    anim.src = "animations/Held.gif"
    window.electronStartDrag?.();
});

container.addEventListener('mouseup', () => {
    held = false;
    anim.src = `animations/${animations[animation]}.gif`
    window.electronStopDrag?.();
});
</script>

</body>
</html>
