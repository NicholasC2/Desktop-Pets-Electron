<!DOCTYPE html>
<html>
    <head>
        <style>
            html,
            head,
            body {
                margin:0;
                padding:0;
                width: 100%;
                height: 100%;

                overflow: hidden;

                font-family: Arial, Helvetica, sans-serif;
            }

            * {
                pointer-events: none;
                user-select: none;
            }

            .main-content {
                background: black;
                background-repeat: no-repeat;
                color: white;
                width: 100%;
                height: 100%;
                text-align: center;
                display: flex;
                justify-content: center;
                align-items: center;
                transform: scaleY(-1);

			    --fade: 0.3;

                mask-image: linear-gradient(
                    to top,
                    rgba(0,0,0,var(--fade)) 0%,
                    rgba(0,0,0,0) calc(var(--fade) * 100%)
                );

                filter: drop-shadow(0 0 2px black);
            }
        </style>
    </head>
    <body>
        <div class="main-content">

        </div>

        <script>
            const { ipcRenderer } = require("electron");

            let frameWidth = 0;

            ipcRenderer.on("set-animation", (e, animation, width) => {
                const content = document.querySelector(".main-content");

                content.innerHTML = "";

                content.style.background = "none";
                content.style.backgroundImage = `url(${animation})`;

                const img = new Image();
                img.src = animation;

                img.onload = () => {
                    frameWidth = img.width / width;

                    content.style.width = frameWidth + "px";
                    content.style.height = img.height + "px";

                    ipcRenderer.send("set-size", frameWidth, img.height);
                };
            });

            ipcRenderer.on("set-animation-pos", (e, pos) => {
                const content = document.querySelector(".main-content");

                content.style.backgroundPosition = `${pos}px 0px`;
            })

            ipcRenderer.on("set-animation-reflection", (e, reflection) => {
                const content = document.querySelector(".main-content");

			    content.style.setProperty("--fade", reflection);
            })
        </script>
    </body>
</html>
