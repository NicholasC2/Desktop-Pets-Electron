<!DOCTYPE html>
<html>
<head>
	<style>
		@keyframes animate {
			0%   { background-position-x: 0; }
			100% { background-position-x: -1540px; }
		}

		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: transparent;
			overflow: auto;

			font-family: Arial, Helvetica, sans-serif;

			pointer-events: none;
			-webkit-app-region: no-drag;
		}

		#container {
			width: 220px;
			height: 256px;
			position: relative;

            background: url("Dance_Large.png");
			background-repeat: no-repeat;
            
			animation-name: animate;
			animation-timing-function: steps(7);
			animation-duration: 1s;
			animation-iteration-count: infinite;

			filter: drop-shadow(0px 0px 5px black);

			--fade: 0.3;
			
			transform: scaleY(-1);

			mask-image: linear-gradient(
				to top,
				rgba(0,0,0,var(--fade)) 0%,
				rgba(0,0,0,0) calc(var(--fade) * 100%)
			);
		}
	</style>
</head>

<body>

	<div id="container"></div>

	<script>
		const { ipcRenderer } = require("electron");

		const container = document.querySelector("#container");

        ipcRenderer.on("reflect-state", (e, i) => {
			container.style.setProperty("--fade", i.reflect)
            container.style.animationDuration = i.speed+"s";
			container.style.backgroundPositionY = -256 * i.animation + "px";
            if(i.reset) {
                container.style.animationName = "none";
                container.style.animationName = `animate`;
            }
        })
	</script>

</body>
</html>
