<!DOCTYPE html>
<html>
<head>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			background: transparent;
			overflow: hidden;
		}

		#container {
			width: 220px;
			height: 220px;
			position: relative;

			cursor: grab;
		}

		#container:active {
			cursor: grabbing;
		}

		#anim {
			width: 200px;
			height: 200px;

			position: absolute;
			top: 10px;
			left: 10px;

			user-select: none;
			-webkit-user-drag: none;
			pointer-events: none;

			filter: drop-shadow(0px 0px 5px black);
		}
	</style>
</head>

<body>

	<div id="container">
		<img id="anim" src="animations/Waiting.gif">
	</div>

	<script>
		const { ipcRenderer } = require("electron");

		const container = document.querySelector("#container");
		const anim = document.getElementById("anim");

		const animations = [
			"Waiting",
			"Stepping",
			"Jumping",
			"Zombie",
			"Waving",
			"Hula",
			"Windmill",
			"Zitabata",
			"Dervish"
		];

		let animation = 0;
		let dragging = false;

		container.addEventListener("mousedown", (e) => {

			if (e.button !== 0) return;

			dragging = true;
			anim.src = "animations/Held.gif";

			ipcRenderer.send("drag-start", {
				x: e.screenX,
				y: e.screenY
			});
		});

		window.addEventListener("mousemove", (e) => {

			if (!dragging) return;

			ipcRenderer.send("drag-move", {
				x: e.screenX,
				y: e.screenY
			});
		});

		window.addEventListener("mouseup", () => {

			if (!dragging) return;

			dragging = false;

			anim.src = `animations/${animations[animation]}.gif`;

			ipcRenderer.send("drag-end");
		});

		window.addEventListener("contextmenu", (e) => {
			e.preventDefault();
			ipcRenderer.send("show-context-menu");
		});

		ipcRenderer.on("set-animation", (e, i) => {
			animation = i;
			if (!dragging) {
				anim.src = `animations/${animations[i]}.gif`;
			}
		});
	</script>

</body>
</html>
