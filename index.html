<!DOCTYPE html>
<html>
    <head>
        <style>
            html,
            head,
            body {
                margin:0;
                padding:0;
                width: 100%;
                height: 100%;

                overflow: hidden;

                font-family: Arial, Helvetica, sans-serif;
            }

            * {
                pointer-events: none;
                user-select: none;
            }

            .main-content {
                background: rgba(50, 50, 50, 0.5);
                background-repeat: no-repeat;
                color: white;
                width: 100%;
                height: 100%;
                text-align: center;
                display: flex;
                justify-content: center;
                align-items: center;

                filter: drop-shadow(0 0 2px black);
            }
        </style>
    </head>
    <body>
        <div class="main-content">
            Pet not loaded.
        </div>

        <script>
            const { ipcRenderer } = require("electron");

            window.addEventListener("contextmenu", (e) => {
                e.preventDefault();

                ipcRenderer.send("open-menu", {
                    x: e.screenX,
                    y: e.screenY
                });
            });

            function runUpdate() {
                updateBackgroundPos();

                setTimeout(runUpdate, (60000 / updateBPM) / frames);
            }

            let updateBackgroundPos = ()=>{}
            let frameWidth = 0;
            let bgX = 0;

            let updateBPM = 60

            let frames = 0;

            runUpdate();

            ipcRenderer.on("set-animation-speed", (e, bpm) => {
                updateBPM = bpm;
            })

            ipcRenderer.on("set-animation", (e, animation, width) => {
                const content = document.querySelector(".main-content");

                content.innerHTML = "";

                content.style.background = "none";
                content.style.backgroundImage = `url(${animation})`;

                const img = new Image();
                img.src = animation;

                img.onload = () => {
                    frames = width;

                    frameWidth = img.width / frames;

                    content.style.width = frameWidth + "px";
                    content.style.height = img.height + "px";

                    bgX = 0;

                    ipcRenderer.send("set-size", frameWidth, img.height);

                    updateBackgroundPos = () => {
                        bgX -= frameWidth;

                        if (bgX <= -img.width) {
                            bgX = 0;
                        }

                        content.style.backgroundPosition = `${bgX}px 0px`;

                        ipcRenderer.send("set-animation-pos", bgX)
                    };
                };
            });

            let isDragging = false;

            window.addEventListener("mousedown", (e) => {
                if(e.button !== 0) return;

                isDragging = true;

                ipcRenderer.send("drag-start");
            });

            window.addEventListener("mousemove", (e) => {
                if (!isDragging) return;

                ipcRenderer.send("drag-move", {
                    x: e.screenX,
                    y: e.screenY
                });
            });

            window.addEventListener("mouseup", () => {
                isDragging = false;
                ipcRenderer.send("drag-end");
            });
        </script>
    </body>
</html>
