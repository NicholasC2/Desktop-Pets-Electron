<!DOCTYPE html>
<html>
<head>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;

            overflow: hidden;

            font-family: Arial, Helvetica, sans-serif;
        }

        .menu {
            width: 100%;
            box-sizing: border-box;

            display: flex;
            flex-direction: column;
            gap: 10px;

            padding: 10px;

            background: rgba(50, 50, 50, 0.5);
            color: orange;
        }
    </style>
    <link rel="stylesheet" href="./menu.css">
</head>
<body>
    <div class="menu"></div>

    <script>
        const { ipcRenderer } = require("electron");

        const menu = document.querySelector(".menu");

        ipcRenderer.on("menu-content", (e, html) => {
            menu.innerHTML = html;

            ipcRenderer.send("menu-height", menu.scrollHeight);
        });

        window.addEventListener("click", (e) => {
            ipcRenderer.send("click", {
                x: e.clientX,
                y: e.clientY,
                class: e.target.className || "",
                elem: e.target.type
            });
        });

        function setRememberWindowPos(value) {
            ipcRenderer.send("setRememberWindowPos", value);
        }

        function setAutoStart(value) {
            ipcRenderer.send("setAutoStart", value);
        }

        function setAnimation(animation, width) {
            ipcRenderer.send("set-animation", animation, width);
        }

        function setAnimationSpeed(speed) {
            speed = Math.min(Math.max(speed,20),300)

            const slider = document.querySelector(".animation-speed-slider");
            const label = document.querySelector(".animation-speed-label");

            if (slider) {
                slider.value = speed;
            }

            if (label) {
                label.value = speed;
            }

            ipcRenderer.send("set-animation-speed", Number(speed));
        }

        function setReflect(reflect) {
            reflect = Math.min(Math.max(reflect,0),1)

            const slider = document.querySelector(".reflect-slider");
            const label = document.querySelector(".reflect-label");

            if (slider) {
                slider.value = reflect;
            }

            if (label) {
                label.value = reflect;
            }

            ipcRenderer.send(
                "set-animation-reflection",
                Number(reflect)
            );
        }
    </script>
</body>
</html>
