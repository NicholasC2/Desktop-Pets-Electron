<!DOCTYPE html>
<html>
<head>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        * {
            pointer-events: none;
            user-select: none;
        }

        .main-content {
            width: 200px;
            height: 200px;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            text-align: center;

            background: rgba(50, 50, 50, 0.5);
            background-repeat: no-repeat;
            background-position: 0 0;

            transform: scaleY(-1);

            --fade: 0.3;

            mask-image: linear-gradient(
                to top,
                rgba(0, 0, 0, var(--fade)) 0%,
                rgba(0, 0, 0, 0) calc(var(--fade) * 100%)
            );

            filter: drop-shadow(0 0 2px black);
        }
    </style>
</head>
<body>
    <div class="main-content"></div>

    <script>
        const { ipcRenderer } = require("electron");

        const content = document.querySelector(".main-content");

        function resetAnimation() {
            content.style.background = "rgba(50, 50, 50, 0.5)";
            content.style.backgroundImage = "none";
            content.style.backgroundPosition = "0px 0px";

            content.style.width = "200px";
            content.style.height = "200px";

            content.style.setProperty("--fade", 0.3);

            ipcRenderer.send("set-size", 200, 200);
        }

        ipcRenderer.on("reset-animation", resetAnimation);

        ipcRenderer.on("set-animation", (e, animation = {url: "", name: "", width: 0}) => {
            content.style.background = "none";
            content.style.backgroundImage = `url(${animation.url})`;
            content.style.backgroundPosition = "0px 0px";

            const img = new Image();
            img.src = animation.url;

            img.onload = () => {
                const frameWidth = img.width / animation.width;

                content.style.width = `${frameWidth}px`;
                content.style.height = `${img.height}px`;

                ipcRenderer.send("set-size", frameWidth, img.height);
            };
        });

        ipcRenderer.on("set-animation-pos", (e, pos) => {
            content.style.backgroundPosition = `${pos}px 0px`;
        });

        ipcRenderer.on("set-animation-reflection", (e, reflection) => {
            content.style.setProperty("--fade", reflection);
        });

        resetAnimation();
    </script>
</body>
</html>
